name: Release

# Triggered by tag push `v*` (canonical release path) or manual
# workflow_dispatch for dry-run validation of this workflow itself.
# See `.claude/CLAUDE.md` → "Release flow" for the discipline.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build + test, but skip npm publish'
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write  # required for npm --provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # `npm run test:e2e` preflight uses `git branch -r --contains
          # HEAD`, which needs enough history for the remote-ref query
          # to resolve. Default shallow clone can miss it.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag '$GITHUB_REF_NAME' does not match package.json version '$PKG_VERSION'. Bump package.json or push the correct tag."
            exit 1
          fi
          echo "Tag and package.json version agree: $PKG_VERSION"

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: Ship-loop tests
        run: bash tests/ship-loop.test.sh

      - name: E2E install tests
        # `install plugins` and `install --all` skip gracefully when
        # `claude` CLI isn't on PATH (ubuntu-latest doesn't have it).
        # `install hooks --hook notify` skips on non-darwin. The five
        # remaining scenarios (preflight + workflow + skills + recommended
        # + skills filter) still validate the tarball + fetch pipeline.
        run: npm run test:e2e

      - name: Publish to npm
        # Skip publish on dry-run workflow_dispatch. Tag-push always
        # publishes (there's no reason to push a tag without intent to
        # release).
        if: |
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' && inputs.dry_run == false)
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
