name: Claude Code Review

on:
  pull_request:
    types: [ready_for_review, synchronize, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

concurrency:
  group: claude-code-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    # Skip Draft PRs and fork PRs (which can't access secrets).
    # `secrets` context is not available in job-level `if:` — use the fork flag instead.
    if: github.event.pull_request.draft == false && github.event.pull_request.head.repo.fork == false
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure deep-review skill is available
        # This workflow may ship to repos that don't have the
        # deep-review skill installed yet. Auto-install from the
        # upstream marketplace if missing so the review prompt below
        # can always Read the skill file.
        #
        # Path choice: `.claude/skills/deep-review/SKILL.md` works
        # uniformly in both cases:
        #   - Repos with the full auriga harness ship this path as a
        #     tracked symlink → `../../.agents/skills/deep-review`,
        #     which `[ -f ... ]` resolves (dereferences by default).
        #   - Fresh `npx skills add --agent claude-code` in a clean
        #     repo writes `.claude/skills/deep-review/SKILL.md` as a
        #     regular file directly — no `.agents/` intermediary.
        run: |
          SKILL=.claude/skills/deep-review/SKILL.md
          # Validate: existence AND well-formed frontmatter. Partial
          # writes or stale truncations would pass a bare `[ -f ]`.
          if [ -f "$SKILL" ] && grep -q '^name: deep-review$' "$SKILL"; then
            echo "deep-review skill present and well-formed"
          else
            echo "deep-review skill missing or malformed — installing from Ben2pc/g-claude-code-plugins"
            npx -y skills add Ben2pc/g-claude-code-plugins \
              --skill deep-review \
              --agent claude-code \
              --yes
            # Post-install validation — fail loud so the review step
            # doesn't run against a broken contract.
            if ! grep -q '^name: deep-review$' "$SKILL"; then
              echo "ERROR: skills install did not produce a well-formed SKILL.md at $SKILL"
              exit 1
            fi
          fi

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Opus for deeper reasoning. The default (sonnet-4-6) produces
          # shallow reviews on non-trivial PRs — an earlier run on PR #31
          # surfaced 1 finding versus 11 from a locally-driven codex
          # deep-review over the same diff.
          claude_args: >-
            --model claude-opus-4-7
            --allowed-tools
            "Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(git status:*),Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(gh api:*),Bash(rg:*),Bash(cat:*),Bash(head:*),Bash(tail:*),Bash(wc:*),Bash(ls:*),Read,Grep,Glob"

          # Expose the SDK tool-use stream in the Action log. Without
          # this, permission denials / tool call detail are hidden and
          # you can't tell why a review went shallow.
          show_full_output: 'true'

          # Review taxonomy (dimensions, severity rules, output format) lives
          # in the deep-review SKILL.md — the single source of truth. The
          # bootstrap step above guarantees .claude/skills/deep-review/SKILL.md
          # exists (either as a tracked symlink shipped with the auriga
          # harness, or as a regular file installed by `npx skills add`).
          # This prompt defers to the skill and only encodes CI-specific
          # adaptations: serial (not parallel-dispatch) execution, and
          # two-channel posting into GitHub's review threads vs. top-level
          # comments.
          #
          # Two-channel posting: the repo has "Require conversation
          # resolution before merging" enabled, which gates on review
          # threads (inline file:line comments) — NOT on top-level issue
          # comments. Blocking findings go to inline threads (must be
          # resolved to merge); non-blocking goes to one top-level
          # comment (doesn't block, stays visible for triage).
          prompt: |
            You are reviewing PR #${{ github.event.pull_request.number }} on ${{ github.repository }}.

            ## Step 1 — gather context

            Run `gh pr view ${{ github.event.pull_request.number }}` and `gh pr diff ${{ github.event.pull_request.number }}` for full context. Read related source files as needed.

            ## Step 2 — load the review contract

            The dimension taxonomy, per-dimension focus lists, severity rules, and "No findings." output format come from the `deep-review` skill — it is the authoritative contract. Read it from the skill's native location (the bootstrap step above guarantees the file exists):

            `.claude/skills/deep-review/SKILL.md`

            Apply the skill's dispatch matrix against this PR's diff.

            **Bootstrap fail-safe**: if the `Read` of the skill file fails or returns empty/truncated content, STOP. Post a single top-level comment via `gh pr comment ${{ github.event.pull_request.number }} --body "bootstrap-failed: deep-review skill unavailable at .claude/skills/deep-review/SKILL.md"` and exit without producing a review. Do NOT improvise a review without the skill contract — the review's value depends on the skill being authoritative.

            **CI-specific adaptations** (unavoidable deviations from the skill's defaults because you run serially inside GitHub Actions, not as parallel subagents):

            - Do NOT dispatch subagents. You are a single Agent — walk the skill's matrix serially and produce one consolidated report.
            - Assign severity per the skill's **Classification rule** section — do not invent your own thresholds.
            - Use each applicable dimension name (as defined in the skill's required / conditional / non-trivial-general reviewer sections) as a section heading in your final top-level comment. Sections that don't apply (e.g., a CLI-only PR has no UX section) are omitted; required sections with nothing to report get exactly `No findings.`.
            - For any merged-lens reviewers the skill defines, group your findings under each lens as sub-headings so readers can locate specific categories of issue.

            ## Step 3 — post findings via two-channel posting (critical — do not deviate)

            **Channel A — inline review threads for BLOCKING findings** (gated by "Require conversation resolution"; author must resolve each before merge).

            Create ONE review with all blocking findings as inline comments:
            ```
            gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews \
              --method POST \
              -f event=COMMENT \
              -f body="Deep review — N blocking findings. Each inline comment below must be resolved before merge. Non-blocking findings are in a separate top-level comment." \
              -F 'comments[][path]=<file>' -F 'comments[][line]=<line>' -F 'comments[][body]=<finding description>' \
              -F 'comments[][path]=<file>' -F 'comments[][line]=<line>' -F 'comments[][body]=<finding description>' \
              ...
            ```
            If zero blocking findings, SKIP this call entirely (do not post an empty review).

            **Channel B — top-level summary comment for ALL findings** (not gated; visible for triage).

            Always post via `gh pr comment ${{ github.event.pull_request.number }} --body-file <path>` containing:
            - One section per applicable dimension from the skill's matrix (required first, then conditional-by-tag, then non-trivial general). Skill section order is authoritative — do not reorder.
            - Each section = ≤200 words summary + bullet list of findings
            - Each finding line: `` `<file>:<line>` — <one-line description> — [severity: blocking | non-blocking] ``
            - Required sections with nothing to report: write exactly `No findings.`
            - Sections that don't apply (no matching tag, trivial change, etc.): omit entirely
            - End with: `OVERALL: <N blocking> / <M non-blocking>`

            Format rules:
            - Do NOT restate the diff
            - Do NOT include code excerpts longer than 5 lines
            - Keep the top-level comment self-contained (so the reader doesn't need to click into inline threads for context)

            Complete both posts in a single turn. Do not explore and stop — decide severities, write both payloads, then post.

          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

